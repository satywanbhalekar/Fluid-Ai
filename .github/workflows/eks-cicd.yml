name: Build Push and Deploy to EKS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  EKS_CLUSTER_NAME: b17
  ECR_REGISTRY: 208851973284.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPOSITORY: b17
  IMAGE_TAG: ${{ github.sha }}
  BACKEND_IMAGE: 208851973284.dkr.ecr.ap-south-1.amazonaws.com/b17:backend-${{ github.sha }}
  K8S_NAMESPACE: talent-app

jobs:
  ci:
    name: CI - Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      backend_image: ${{ steps.image.outputs.backend_image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image output
        id: image
        run: echo "backend_image=${BACKEND_IMAGE}" >> $GITHUB_OUTPUT

      - name: Build backend image
        run: |
          docker build -t $BACKEND_IMAGE ./backend

      - name: Push backend image
        run: |
          docker push $BACKEND_IMAGE

  cd:
    name: CD - Deploy to EKS
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
    env:
      BACKEND_IMAGE: ${{ needs.ci.outputs.backend_image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER_NAME

      - name: Replace image placeholder in backend manifest
        run: |
          sed -i "s|IMAGE_BACKEND|$BACKEND_IMAGE|g" k8s/backend-deployment.yaml

      - name: Deploy namespace
        run: |
          kubectl apply -f k8s/namespace.yaml

      - name: Recreate postgres with corrected storage class
        run: |
          kubectl delete statefulset postgres -n $K8S_NAMESPACE --ignore-not-found=true
          kubectl delete pvc postgres-data-postgres-0 -n $K8S_NAMESPACE --ignore-not-found=true
          kubectl apply -f k8s/postgres-secret.yaml
          kubectl apply -f k8s/postgres-service.yaml
          kubectl apply -f k8s/postgres-statefulset.yaml
          

      - name: Wait for postgres
        run: |
          kubectl rollout status statefulset/postgres -n $K8S_NAMESPACE --timeout=180s

      - name: Deploy backend resources
        run: |
          kubectl apply -f k8s/backend-secret.yaml
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/backend-service.yaml

      - name: Wait for backend rollout
        run: |
          kubectl rollout status deployment/talent-api -n $K8S_NAMESPACE --timeout=180s

      - name: Verify deployment
        run: |
          kubectl get all -n $K8S_NAMESPACE
          kubectl get pvc -n $K8S_NAMESPACE