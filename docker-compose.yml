services:
  frontend:
    build:
      context: ./talent-directory
      dockerfile: Dockerfile
    expose:
      - "3000"
    env_file:
      - ./talent-directory/.env
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "5000"
    env_file:
      - ./backend/.env

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
